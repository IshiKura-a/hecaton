apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: swe-python
  namespace: hecaton-sandboxes
spec:
  podTemplate:
    spec:
      containers:
      - name: sandbox
        # NOTE: random placeholder image — replace with whatever you have
        # built that implements the agent-sandbox HTTP contract.
        image: ghcr.io/your-org/swe-python:latest
        ports:
        - containerPort: 8888
        resources:
          requests:
            cpu: "1"
            memory: 2Gi

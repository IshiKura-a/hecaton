# Inventory of hosts that make up the hecaton fleet (the docker hosts that
# run sandbox pods). Trainer machines run elsewhere (e.g. Singularity) and
# join the tailnet separately under tag:trainer — they do NOT go here.
#
# Copy this file to config/hosts.yaml and edit. config/hosts.yaml is gitignored.
#
# `name` is hecaton's inventory name: the stable label you pass to ops scripts
# such as `ops/maintenance-host.sh start <name>`. It is not an SSH target and
# does not need to equal the machine's OS hostname.
#
# `ssh_host` is what gets passed straight to `ssh` as the target. The expected
# pattern is to define a `Host <ssh_host>` block in your local ~/.ssh/config
# with HostName, User, Port, IdentityFile, etc. hecaton itself does NOT store
# any ssh credentials, users, or key paths.
#
# Kubernetes node names come from each remote machine's `hostname`, lowercased
# by k3s/Tailscale bootstrap. Node-exporter may expose the OS nodename with its
# original case. Hecaton keeps those separate from `name` and `ssh_host`.
#
# `role` is one of:
#   server   - runs the k3s control plane (exactly one across the fleet).
#   agent    - runs k3s agent (workers; can be many).
#
# `gpu_count` (optional) caps how many GPUs the device plugin exposes to
# Kubernetes. Omit to expose all GPUs the host actually has. Useful when a
# host has 8 GPUs but you want to reserve 4 for non-k8s workloads — set
# `gpu_count: 4` and only indices 0..3 will be advertised as schedulable
# `amd.com/gpu` or `nvidia.com/gpu` resources.
#
# GPU vendor (nvidia / amd / none) is auto-detected per host via `lspci`
# during bootstrap; it is not configured here.
#
# `max_pods` (optional) caps how many pods (sandboxes) can run on the node.
# Omit to default to the host's CPU count (1 sandbox per core).
#
# `disk_root` (optional) is the filesystem mount used for sandbox/runtime data
# and disk monitoring. Omit to default to /. For large image fleets, point this
# at the host's data disk, e.g. /disk1.

hosts:
  - name: control-plane-1
    ssh_host: gpu-host-01   # alias in ~/.ssh/config
    role: server

  - name: worker-1
    ssh_host: gpu-host-02
    role: agent
    gpu_count: 4            # only expose 4 GPUs of this host to k8s
    max_pods: 32            # optional; defaults to CPU count
    # disk_root: /disk1      # optional; defaults to /

  # Add the rest of your hosts below.

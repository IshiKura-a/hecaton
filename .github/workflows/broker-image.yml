name: broker-image

# Build the broker container image and push to GitHub Container Registry
# whenever code under platform/broker/ or envs/ changes on the main
# branch (envs/ is included because the trainer SDK and broker share
# no code today, but bumping the SDK often accompanies broker changes).
#
# Tags pushed:
#   ghcr.io/<owner>/hecaton-broker:latest
#   ghcr.io/<owner>/hecaton-broker:<sha>
#
# After a push to main, update `.env` on the laptop:
#   BROKER_IMAGE=ghcr.io/<owner>/hecaton-broker:<sha>
# then re-run `bash bootstrap/cluster/26-install-broker.sh`.

on:
  push:
    branches: [main]
    paths:
      - "platform/broker/**"
      - "envs/**"
      - ".github/workflows/broker-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/hecaton-broker
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: platform/broker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
